<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW API デバッグ</title>
<style>
  body{font-family:monospace;background:#1a1a1a;color:#eee;padding:20px;font-size:12px;}
  button{background:#1a4a7a;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin-bottom:10px;}
  pre{background:#2a2a2a;padding:15px;border-radius:6px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:80vh;overflow-y:auto;}
  .status{color:#c8a84b;margin-bottom:10px;}
  .url-test{background:#2a2a2a;padding:10px;border-radius:6px;margin-bottom:10px;}
  input{background:#333;color:#eee;border:1px solid #555;padding:6px 10px;border-radius:4px;width:100%;box-sizing:border-box;font-family:monospace;font-size:12px;margin-bottom:6px;}
</style>
</head>
<body>
<h2 style="color:#c8a84b">JW API デバッグツール</h2>

<div class="url-test">
  <p style="color:#aaa;margin-bottom:6px">テストするAPIのURL：</p>
  <input type="text" id="api-url" value="https://data.jw-api.org/mediator/v1/categories/J/VODStudio?detailed=1">
  <button onclick="testUrl()">このURLを取得</button>
  <button id="dl-btn" onclick="downloadTxt()" style="display:none;background:#c8a84b;color:#3a2800;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin-left:8px;">📥 TXTでダウンロード</button>
</div>

<div class="status" id="status">ボタンを押してAPIを取得してください</div>
<pre id="output">（結果がここに表示されます）</pre>

<script>
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + u,
  u => 'https://corsproxy.io/?url=' + u,
  u => 'https://api.allorigins.win/get?url=' + u,
];

async function testUrl() {
  const targetUrl = document.getElementById('api-url').value.trim();
  const status = document.getElementById('status');
  const output = document.getElementById('output');
  output.textContent = '取得中…';

  for (let i = 0; i < PROXIES.length; i++) {
    const proxyUrl = PROXIES[i](targetUrl);
    status.textContent = `プロキシ ${i+1}/3 試行中: ${proxyUrl.slice(0,80)}...`;
    try {
      const res = await fetch(proxyUrl, { cache: 'no-cache' });
      status.textContent = `プロキシ ${i+1} → HTTP ${res.status}`;
      if (!res.ok) continue;
      const text = await res.text();

      // JSONラッパーを解除
      let content = text;
      if (text.trim().startsWith('{')) {
        try {
          const j = JSON.parse(text);
          content = j.contents || text;
        } catch {}
      }

      // JSONとして整形表示
      try {
        const parsed = JSON.parse(content);
        // mediaアイテムのサンプルを抽出
        const sample = extractSample(parsed);
        output.textContent =
          '=== プロキシ生レスポンス（最初の500文字）===\n' +
          text.slice(0, 500) +
          '\n\n=== contentsフィールド（最初の500文字）===\n' +
          (content !== text ? content.slice(0, 500) : '（contentsなし、textを直接使用）') +
          '\n\n=== 最初のmediaアイテム（サンプル）===\n' +
          JSON.stringify(sample, null, 2) +
          '\n\n=== フルレスポンス（最初の3000文字）===\n' +
          JSON.stringify(parsed, null, 2).slice(0, 3000);
        status.textContent = `✅ 成功（プロキシ${i+1}）`;
        document.getElementById('dl-btn').style.display = 'inline-block';
      } catch(parseErr) {
        output.textContent = '=== JSON解析エラー: ' + parseErr.message + ' ===\n生テキスト:\n' + text.slice(0, 2000);
        status.textContent = `⚠ 取得成功（JSON解析失敗）プロキシ${i+1}`;
      }
      return;
    } catch(e) {
      status.textContent = `プロキシ ${i+1} 失敗: ${e.message}`;
    }
  }
  output.textContent = '全プロキシ失敗';
}

function extractSample(json) {
  // categoryの中のmediaを再帰的に探す
  const results = [];
  function walk(obj, depth) {
    if (!obj || typeof obj !== 'object' || depth > 5) return;
    if (Array.isArray(obj.media) && obj.media.length > 0) {
      results.push({
        categoryKey: obj.key,
        categoryName: obj.name,
        firstMedia: obj.media[0],
        mediaCount: obj.media.length,
      });
    }
    for (const key of ['category', 'subcategories']) {
      if (obj[key]) {
        if (Array.isArray(obj[key])) obj[key].forEach(c => walk(c, depth+1));
        else walk(obj[key], depth+1);
      }
    }
  }
  walk(json, 0);
  return results.slice(0, 3); // 最初の3カテゴリのみ
}

function downloadTxt() {
  const text = document.getElementById('output').textContent;
  const blob = new Blob([text], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'jw_api_result.txt';
  a.click();
}
</script>
</body>
</html>
