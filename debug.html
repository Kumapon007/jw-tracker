<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW API デバッグ v2</title>
<style>
  body{font-family:monospace;background:#1a1a1a;color:#eee;padding:20px;font-size:12px;}
  h2{color:#c8a84b;margin-bottom:14px;}
  input{background:#333;color:#eee;border:1px solid #555;padding:8px 10px;border-radius:4px;width:100%;box-sizing:border-box;font-family:monospace;font-size:12px;margin-bottom:8px;}
  .btn{border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-size:13px;margin-right:8px;margin-bottom:8px;}
  .btn-blue{background:#1a4a7a;color:white;}
  .btn-gold{background:#c8a84b;color:#3a2800;display:none;}
  .status{color:#c8a84b;margin:8px 0;min-height:20px;}
  pre{background:#2a2a2a;padding:14px;border-radius:6px;overflow:auto;white-space:pre-wrap;word-break:break-all;max-height:75vh;margin-top:10px;}
</style>
</head>
<body>
<h2>JW API デバッグ v2</h2>
<input type="text" id="url" value="https://data.jw-api.org/mediator/v1/categories/J?detailed=0">
<div>
  <button class="btn btn-blue" onclick="run()">取得する</button>
  <button class="btn btn-gold" id="dl">📥 TXTダウンロード</button>
</div>
<div class="status" id="status">—</div>
<pre id="out">（結果がここに表示されます）</pre>

<script>
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + u,
  u => 'https://corsproxy.io/?url=' + u,
  u => 'https://api.allorigins.win/get?url=' + u,
];

let lastText = '';

async function run() {
  const url = document.getElementById('url').value.trim();
  const status = document.getElementById('status');
  const out = document.getElementById('out');
  document.getElementById('dl').style.display = 'none';
  out.textContent = '取得中…';

  for (let i = 0; i < PROXIES.length; i++) {
    status.textContent = 'プロキシ ' + (i+1) + '/3 試行中…';
    try {
      const res = await fetch(PROXIES[i](url), {cache:'no-cache'});
      if (!res.ok) { status.textContent = 'プロキシ'+(i+1)+': HTTP '+res.status; continue; }
      let text = await res.text();
      if (!text || text.length < 5) continue;

      if (text.trim().startsWith('{"contents"')) {
        try { const j = JSON.parse(text); if (j.contents) text = j.contents; } catch {}
      }

      let parsed;
      try { parsed = JSON.parse(text); } catch(e) {
        status.textContent = '取得成功（JSON解析失敗）プロキシ'+(i+1);
        out.textContent = text.slice(0, 5000);
        lastText = text;
        document.getElementById('dl').style.display = 'inline-block';
        return;
      }

      const keys = [];
      function walkKeys(obj, depth) {
        if (!obj || typeof obj !== 'object' || depth > 8) return;
        if (obj.key) keys.push('  '.repeat(depth) + obj.key + '  :  ' + (obj.name || ''));
        ['categories','category','subcategories'].forEach(function(k) {
          if (!obj[k]) return;
          if (Array.isArray(obj[k])) obj[k].forEach(function(c){ walkKeys(c, depth+1); });
          else walkKeys(obj[k], depth+1);
        });
      }
      walkKeys(parsed, 0);

      const keySection = keys.length
        ? '=== カテゴリ KEY 一覧 (' + keys.length + '件) ===\n' + keys.join('\n')
        : '（keyフィールドなし）';
      const fullSection = '=== フルJSON ===\n' + JSON.stringify(parsed, null, 2);
      lastText = keySection + '\n\n' + fullSection;
      out.textContent = keySection + '\n\n' + fullSection.slice(0, 3000) + '\n\n…（省略。ダウンロードで全文確認）';

      status.textContent = '✅ 成功（プロキシ'+(i+1)+'）';
      document.getElementById('dl').style.display = 'inline-block';
      return;
    } catch(e) {
      status.textContent = 'プロキシ'+(i+1)+' エラー: '+e.message;
    }
  }
  out.textContent = '全プロキシ失敗';
}

document.getElementById('dl').addEventListener('click', function() {
  const blob = new Blob([lastText], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'jw_api_keys.txt';
  a.click();
});
</script>
</body>
</html>
