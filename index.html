<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JW.org 新着トラッカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap');
  :root {
    --bg:#f5f0e8; --surface:#fffdf8; --surface2:#ede8dc;
    --accent:#1a4a7a; --accent2:#c8a84b;
    --text:#1a1a1a; --text-muted:#6b6560; --read-color:#a09890;
    --border:#ddd8cc; --shadow:0 2px 12px rgba(0,0,0,0.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:60px;}
  header{background:var(--accent);color:white;padding:22px 20px 16px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 3px 20px rgba(26,74,122,0.4);}
  header h1{font-family:'Noto Serif JP',serif;font-size:1.3rem;font-weight:600;letter-spacing:0.08em;margin-bottom:3px;}
  header p{font-size:0.73rem;opacity:0.7;}
  .stats-bar{background:var(--accent2);padding:7px 20px;display:flex;justify-content:center;gap:20px;font-size:0.76rem;font-weight:500;color:#3a2800;flex-wrap:wrap;}
  .stats-bar span{display:flex;align-items:center;gap:4px;}
  .filter-row{background:var(--surface);padding:9px 12px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);justify-content:center;}
  .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:0.74rem;cursor:pointer;color:var(--text-muted);transition:all 0.18s;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
  .filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  main{max-width:680px;margin:0 auto;padding:12px 13px;}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
  .btn-group{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
  .refresh-btn{background:var(--accent);color:white;border:none;border-radius:7px;padding:7px 14px;font-family:'Noto Sans JP',sans-serif;font-size:0.76rem;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background 0.2s;}
  .refresh-btn:hover{background:#163f68;}
  .refresh-btn:disabled{background:var(--text-muted);cursor:not-allowed;}
  .last-updated{font-size:0.69rem;color:var(--text-muted);}
  .reset-btn{background:none;border:1px solid #cc5555;color:#cc5555;border-radius:6px;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;font-size:0.69rem;cursor:pointer;transition:all 0.2s;}
  .reset-btn:hover{background:#cc5555;color:white;}
  .io-btn{background:none;border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:4px 10px;font-family:'Noto Sans JP',sans-serif;font-size:0.69rem;cursor:pointer;transition:all 0.2s;}
  .io-btn:hover{background:var(--accent);color:white;}
  .io-panel{background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:14px;margin-bottom:10px;display:none;}
  .io-panel h3{font-family:'Noto Serif JP',serif;font-size:0.85rem;color:var(--accent);margin-bottom:10px;}
  .io-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .io-row label{font-size:0.78rem;color:var(--text-muted);min-width:80px;}
  .io-info{font-size:0.7rem;color:var(--text-muted);margin-top:4px;line-height:1.6;}
  .loading{text-align:center;padding:45px 20px;color:var(--text-muted);}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:0 auto 12px;animation:spin 0.8s linear infinite;}
  .loading-detail{font-size:0.7rem;margin-top:6px;color:var(--text-muted);}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{background:#fff5f5;border:1px solid #ffcccc;border-radius:10px;padding:16px 18px;color:#aa3333;font-size:0.83rem;line-height:1.7;}
  .error-box strong{display:block;margin-bottom:6px;}
  .error-box code{font-size:0.7rem;background:#ffe8e8;padding:2px 6px;border-radius:3px;display:block;margin-top:6px;word-break:break-all;white-space:pre-wrap;}
  .date-header{font-family:'Noto Serif JP',serif;font-size:0.79rem;font-weight:600;color:var(--accent);padding:13px 0 6px;display:flex;align-items:center;gap:10px;}
  .date-header::after{content:'';flex:1;height:1px;background:var(--border);}
  .item{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:7px;overflow:hidden;transition:all 0.22s ease;box-shadow:var(--shadow);animation:fadeIn 0.22s ease both;}
  .item:hover{box-shadow:0 4px 18px rgba(0,0,0,0.11);transform:translateY(-1px);}
  .item.read{background:var(--surface2);border-color:#d8d2c6;box-shadow:none;opacity:0.65;}
  .item.read:hover{opacity:0.82;transform:none;}
  .item-inner{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
  .type-badge{flex-shrink:0;padding:2px 8px;border-radius:4px;font-size:0.67rem;font-weight:500;margin-top:3px;white-space:nowrap;}
  .badge-video   {background:rgba(26,74,122,0.12);  color:#1a4a7a; border:1px solid rgba(26,74,122,0.25);}
  .badge-article {background:rgba(58,122,74,0.12);  color:#2a6a3a; border:1px solid rgba(58,122,74,0.25);}
  .badge-magazine{background:rgba(160,80,20,0.12);  color:#8a4010; border:1px solid rgba(160,80,20,0.25);}
  .badge-song    {background:rgba(120,40,120,0.12); color:#6a2070; border:1px solid rgba(120,40,120,0.25);}
  .badge-book    {background:rgba(20,100,140,0.12); color:#145a80; border:1px solid rgba(20,100,140,0.25);}
  .badge-other   {background:rgba(100,100,100,0.1); color:#555;    border:1px solid rgba(100,100,100,0.2);}
  .item-body{flex:1;min-width:0;}
  .item-title{display:block;font-size:0.91rem;font-weight:500;color:var(--accent);text-decoration:none;line-height:1.5;word-break:break-all;transition:color 0.18s;}
  .item.read .item-title{color:var(--read-color);text-decoration:line-through;text-decoration-color:var(--read-color);}
  .item-title:hover{color:var(--accent2);}
  .item-category{font-size:0.66rem;color:var(--text-muted);margin-top:2px;}
  .item-duration{font-size:0.63rem;color:var(--text-muted);margin-top:2px;}
  .item-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .read-badge{font-size:0.63rem;color:var(--read-color);background:rgba(160,152,144,0.12);border:1px solid var(--read-color);border-radius:4px;padding:2px 6px;white-space:nowrap;}
  .toggle-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:3px 7px;cursor:pointer;font-size:0.63rem;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;transition:all 0.18s;white-space:nowrap;}
  .toggle-btn:hover{border-color:var(--accent);color:var(--accent);}
  .empty-state{text-align:center;padding:45px 20px;color:var(--text-muted);font-size:0.85rem;line-height:1.8;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
  .add-video-btn{background:var(--accent2);color:#3a2800;border:none;border-radius:7px;padding:7px 14px;font-family:'Noto Sans JP',sans-serif;font-size:0.76rem;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all 0.2s;font-weight:500;}
  .add-video-btn:hover{background:#b8980a;}
  .add-panel{background:var(--surface);border:2px solid var(--accent2);border-radius:12px;padding:16px;margin-bottom:12px;display:none;}
  .add-panel h3{font-family:'Noto Serif JP',serif;font-size:0.88rem;color:var(--accent);margin-bottom:12px;}
  .add-row{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
  .add-row input,.add-row select{font-family:'Noto Sans JP',sans-serif;font-size:0.8rem;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s;flex:1;min-width:140px;}
  .add-row input:focus{border-color:var(--accent);}
  .add-row input[type=date]{flex:0 0 auto;width:140px;}
  .do-add-btn{background:var(--accent);color:white;border:none;border-radius:7px;padding:7px 16px;font-family:'Noto Sans JP',sans-serif;font-size:0.8rem;cursor:pointer;white-space:nowrap;}
  .do-add-btn:hover{background:#163f68;}
  .add-hint{font-size:0.7rem;color:var(--text-muted);margin-top:4px;}
  .badge-manual{background:rgba(200,168,75,0.15);color:#7a5800;border:1px solid rgba(200,168,75,0.35);}
  .del-btn{background:none;border:none;padding:3px 5px;cursor:pointer;font-size:0.75rem;color:#ccc;transition:color 0.18s;line-height:1;}
  .del-btn:hover{color:#cc5555;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<header>
  <h1>JW.org 新着トラッカー</h1>
  <p>記事・雑誌・ビデオを自動取得</p>
</header>
<div class="stats-bar">
  <span>📋 総数: <strong id="total-count">—</strong></span>
  <span>👁 未閲覧: <strong id="unread-count">—</strong></span>
  <span>✅ 閲覧済: <strong id="read-count">—</strong></span>
</div>
<div class="filter-row">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <button class="filter-btn" data-filter="unread">未閲覧のみ</button>
  <button class="filter-btn" data-filter="video">ビデオ</button>
  <button class="filter-btn" data-filter="article">記事</button>
  <button class="filter-btn" data-filter="magazine">雑誌</button>
  <button class="filter-btn" data-filter="song">音楽</button>
  <button class="filter-btn" data-filter="book">書籍</button>
  <button class="filter-btn" data-filter="read">閲覧済み</button>
  <button class="filter-btn" data-filter="manual">手動追加</button>
</div>
<main>
  <div class="toolbar">
    <div class="btn-group">
      <button class="refresh-btn" id="refresh-btn"><span id="refresh-icon">🔄</span> 差分取得</button>
      <button class="refresh-btn" id="full-refresh-btn" style="background:#555;font-size:0.7rem;padding:6px 10px;">🔃 全件取得</button>
      <button class="add-video-btn" id="toggle-add-btn">＋ 手動追加</button>
      <span class="last-updated" id="last-updated"></span>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
      <button class="io-btn" id="io-btn">📦 データ移行</button>
      <button class="reset-btn" id="reset-btn">閲覧履歴をリセット</button>
    </div>
  </div>
  <!-- データ移行パネル -->
  <div class="io-panel" id="io-panel">
    <h3>📦 データ移行（エクスポート / インポート）</h3>
    <div class="io-row">
      <label>エクスポート</label>
      <button class="do-add-btn" id="export-btn">💾 JSONでダウンロード</button>
    </div>
    <div class="io-row">
      <label>インポート</label>
      <input type="file" id="import-file" accept=".json" style="font-size:0.75rem;flex:1;">
      <button class="do-add-btn" id="import-btn">📂 読み込む</button>
    </div>
    <p class="io-info">
      💡 スマホでエクスポートしたJSONをPCで読み込むと、アイテム・閲覧履歴を引き継げます。<br>
      ⚠ インポートすると現在のデータに<strong>マージ</strong>されます（上書きではありません）。
    </p>
  </div>
  <!-- 手動追加パネル -->
  <div class="add-panel" id="add-panel">
    <h3>▶ コンテンツを手動で追加</h3>
    <div class="add-row">
      <input type="text" id="add-title" placeholder="タイトル（例：JW Broadcasting 2026年3月）">
    </div>
    <div class="add-row">
      <input type="url" id="add-url" placeholder="URL">
      <input type="date" id="add-date">
    </div>
    <div class="add-row">
      <select id="add-type">
        <option value="video">ビデオ</option>
        <option value="article">記事</option>
        <option value="magazine">雑誌</option>
        <option value="song">音楽</option>
        <option value="book">書籍</option>
      </select>
      <button class="do-add-btn" id="do-add-btn">追加する</button>
    </div>
    <p class="add-hint">💡 タイトルとURLを入力して追加してください</p>
  </div>
  <div id="content-area">
    <div class="loading"><div class="spinner"></div><p>jw.org から新着情報を取得中…</p><p class="loading-detail" id="loading-detail"></p></div>
  </div>
</main>

<script>
const READ_KEY   = 'jw_read_v11';
const MANUAL_KEY = 'jw_manual_v11';
const ITEMS_KEY = 'jw_items_v11';
const TIME_KEY  = 'jw_time_v11';

const RSS_URLS = [
  'https://www.jw.org/ja/%E6%96%B0%E7%9D%80%E6%83%85%E5%A0%B1/rss/WhatsNewWebArticles/feed.xml',
  // 英語RSSは除外（英語記事混入防止）
];

// ビデオAPIのベースURL（言語コードJ = 日本語）
const VIDEO_API_BASE = 'https://data.jw-api.org/mediator/v1/categories/J/';
// 取得するサブカテゴリ一覧（VODStudioのサブカテゴリ）
// VODStudio配下 + それ以外の主要カテゴリも追加取得
// VODStudio配下のdetailed=1では JWORGExclude タグ付きが省略される場合があるため
// 各カテゴリを直接取得して補完する
const EXTRA_CATS = [
  'VODPgmEvtMorningWorship',  // モーニングワーシップ
  'StudioTalks',              // 講話（JWORGExclude含む）
  'StudioMonthlyPrograms',    // マンスリープログラム
  'StudioDramaAndMovies',     // ドラマ・映画
  'StudioDocumentaries',      // ドキュメンタリー
  'StudioMusicVideos',        // 音楽ビデオ
  'VODInterview',
  'VODMinistryTools',
  'VODOurActivities',
  'VODPeople',
  'VODBibleTeachings',
];

// CORSプロキシ（URLを再エンコードしない）
const PROXIES = [
  u => 'https://api.allorigins.win/raw?url=' + u,
  u => 'https://corsproxy.io/?url=' + u,
  u => 'https://api.allorigins.win/get?url=' + u,
];

async function fetchViaProxy(targetUrl, label) {
  for (let i = 0; i < PROXIES.length; i++) {
    setDetail((label||'') + `（プロキシ${i+1}/3）`);
    try {
      const res = await fetch(PROXIES[i](targetUrl), { cache: 'no-cache' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      if (!text || text.length < 5) throw new Error('空');
      // allorigins /get はJSONラッパー {"contents":"..."} で返す
      // allorigins /raw や corsproxy は直接内容を返す
      if (text.trim().startsWith('{"contents"')) {
        try { const j = JSON.parse(text); if (j.contents) return j.contents; } catch {}
      }
      return text;
    } catch {}
  }
  throw new Error((label || targetUrl) + ': 全プロキシ失敗');
}

// ── ビデオURL生成 ──
// languageAgnosticNaturalKey を lank パラメータに使用（シェアリンクと同じ形式）
function makeVideoUrl(lankKey) {
  if (!lankKey) return 'https://www.jw.org/finder?wtlocale=J&docid=1011267&srcid=share';
  return 'https://www.jw.org/finder?srcid=share&wtlocale=J&lank=' + lankKey;
}

// ── ビデオAPI取得（sinceDate: これより新しいものだけ、nullなら全件）──
async function fetchVideos(sinceDate=null) {
  const seen   = new Set();
  const results = [];

  // まずVODStudio全体をdetailed=1で取得（サブカテゴリのmedia含む）
  let topData = null;
  try {
    const text = await fetchViaProxy(VIDEO_API_BASE + 'VODStudio?detailed=1', 'ビデオ一覧');
    topData = JSON.parse(text);
  } catch(e) {
    throw new Error('ビデオAPI取得失敗: ' + e.message);
  }

  function extractMedia(c) {
    (c.media || []).forEach(m => {
      const key = m.naturalKey || m.guid;
      if (!key || seen.has(key)) return;
      const dateObj = m.firstPublished ? new Date(m.firstPublished) : null;
      if (!dateObj) return;
      if (sinceDate && dateObj < sinceDate) return;
      seen.add(key);
      // languageAgnosticNaturalKey = 言語コードなし版（シェアリンクのlankと同じ）
      const lankKey = m.languageAgnosticNaturalKey || m.naturalKey;
      results.push({
        id:       'vid_' + key,
        title:    m.title || '（タイトルなし）',
        category: c.name || 'ビデオ',
        url:      makeVideoUrl(lankKey),
        duration: m.durationFormattedHHMM || '',
        date:     toDateStr(dateObj),
        dateObj,
        type:     'video',
      });
    });
    (c.subcategories || []).forEach(extractMedia);
  }

  if (topData.category) extractMedia(topData.category);

  // VODStudio配下のサブカテゴリを個別取得して補完
  const subKeys = (topData.category?.subcategories || []).map(s => s.key).filter(Boolean);
  for (const key of subKeys) {
    setDetail(`ビデオ「${key}」補完取得中…`);
    try {
      const text = await fetchViaProxy(VIDEO_API_BASE + key + '?detailed=1', key);
      const json = JSON.parse(text);
      if (json.category) extractMedia(json.category);
    } catch {}
  }

  // VODStudio以外の追加カテゴリも取得（JWORGExcludeタグのビデオを含む）
  for (const key of EXTRA_CATS) {
    setDetail(`追加カテゴリ「${key}」取得中…`);
    try {
      const text = await fetchViaProxy(VIDEO_API_BASE + key + '?detailed=1', key);
      const json = JSON.parse(text);
      if (json.category) extractMedia(json.category);
    } catch {}
  }

  return results;
}

// ── RSS パーサ ──
const TYPE_LABEL = { video:'ビデオ', article:'記事', magazine:'雑誌', song:'音楽', book:'書籍', other:'その他' };
const TYPE_BADGE = { video:'badge-video', article:'badge-article', magazine:'badge-magazine', song:'badge-song', book:'badge-book', other:'badge-other', manual:'badge-manual' };

function classifyType(cat, url) {
  const c = (cat||'').toUpperCase(), u = (url||'').toLowerCase();
  if (c.includes('SONG')||c.includes('音楽')||u.includes('/music-songs/')) return 'song';
  if (c.includes('VIDEO')||c.includes('ビデオ')||c.includes('DRAMA')||u.includes('/videos/')||u.includes('/drama/')) return 'video';
  if (c.includes('WATCHTOWER')||c.includes('ものみの塔')||c.includes('AWAKE')||c.includes('目ざめよ')||
      c.includes('MEETING WORKBOOK')||c.includes('集会テキスト')||u.includes('mwb')||u.includes('/watchtower')||u.includes('/awake')) return 'magazine';
  if (c.includes('BROCHURE')||c.includes('BOOKLET')||c.includes('BOOK')||u.includes('/books/')||u.includes('/brochures/')) return 'book';
  return 'article';
}

function parseRSS(xml, isJa) {
  const doc = new DOMParser().parseFromString(xml, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('XMLパースエラー');
  const items = [...doc.querySelectorAll('item')];
  if (!items.length) throw new Error('アイテム0件');
  return items.map(el => {
    const rawTitle = (el.querySelector('title')?.textContent||'').trim();
    const rawLink  = (el.querySelector('link')?.textContent||el.querySelector('guid')?.textContent||'').trim();
    const pub      = (el.querySelector('pubDate')?.textContent||'').trim();
    const dateObj  = pub ? new Date(pub) : new Date();
    const sep      = rawTitle.indexOf(' | ');
    const cat      = sep > -1 ? rawTitle.slice(0, sep) : '';
    const title    = sep > -1 ? rawTitle.slice(sep+3) : rawTitle;
    const url      = (!isJa && rawLink) ? rawLink.replace('www.jw.org/en/','www.jw.org/ja/') : rawLink;
    return { id: rawLink||rawTitle, title, category: cat, url, duration: '', date: toDateStr(dateObj), dateObj, type: classifyType(cat,url) };
  });
}

async function fetchRSS(sinceDate=null) {
  for (const url of RSS_URLS) {
    try {
      const xml = await fetchViaProxy(url, url.includes('/ja/') ? 'RSS日本語' : 'RSS英語');
      if (xml.includes('<item')) {
        const items = parseRSS(xml, url.includes('/ja/'));
        return sinceDate ? items.filter(it => new Date(it.date) >= sinceDate) : items;
      }
    } catch {}
  }
  throw new Error('RSS取得失敗');
}

function toDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function sixMonthsAgo() { const d=new Date(); d.setFullYear(d.getFullYear()-10); return d; } // 実質制限なし
function setDetail(t) { const el=document.getElementById('loading-detail'); if(el) el.textContent=t; }

// ── 状態 ──
let readSet  = (()=>{try{return new Set(JSON.parse(localStorage.getItem(READ_KEY))||[]);}catch{return new Set();}})();
let allItems   = (()=>{try{return JSON.parse(localStorage.getItem(ITEMS_KEY))||[];}catch{return [];}})();
let manualItems= (()=>{try{return JSON.parse(localStorage.getItem(MANUAL_KEY))||[];}catch{return [];}})();
let filter   = 'all';
function saveRead()  { localStorage.setItem(READ_KEY,  JSON.stringify([...readSet])); }
function saveItems()  { localStorage.setItem(ITEMS_KEY,  JSON.stringify(allItems)); }
function saveManual() { localStorage.setItem(MANUAL_KEY, JSON.stringify(manualItems)); }

// ── 取得共通処理 ──
async function doFetch(sinceDate) {
  // sinceDate=null なら全件、Date なら差分
  const isDiff = sinceDate !== null;
  const diffBtn = document.getElementById('refresh-btn');
  const fullBtn = document.getElementById('full-refresh-btn');
  diffBtn.disabled=true; fullBtn.disabled=true;
  document.getElementById('refresh-icon').textContent='⏳';

  // キャッシュがあれば画面を保ちつつローディング表示を小さく出す
  if (!allItems.length) {
    document.getElementById('content-area').innerHTML=
      '<div class="loading"><div class="spinner"></div><p>jw.org から情報を取得中…</p><p class="loading-detail" id="loading-detail"></p></div>';
  } else {
    setDetail(isDiff ? '差分取得中…' : '全件取得中…');
  }

  try {
    const [rssResult, videoResult] = await Promise.allSettled([
      fetchRSS(sinceDate),
      fetchVideos(sinceDate)
    ]);
    const rssItems   = rssResult.status==='fulfilled'   ? rssResult.value   : [];
    const videoItems = videoResult.status==='fulfilled' ? videoResult.value : [];
    const newItems   = [...videoItems, ...rssItems];

    if (isDiff) {
      // 差分モード：既存に新着をマージ（IDで重複除去）
      const existingIds = new Set(allItems.map(i=>i.id));
      const added = newItems.filter(i => !existingIds.has(i.id));
      if (added.length === 0) {
        setDetail('新着なし');
        setTimeout(()=>setDetail(''), 2000);
        return;
      }
      allItems = [...added, ...allItems];
      allItems.sort((a,b)=>new Date(b.date)-new Date(a.date));
      saveItems();
      localStorage.setItem(TIME_KEY, Date.now());
      const now = new Date();
      document.getElementById('last-updated').textContent =
        now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+
        ' 更新（+'+added.length+'件）';
    } else {
      // 全件モード
      if (!newItems.length) throw new Error('データが0件です');

      // ビデオAPIが失敗していた場合は既存のビデオを引き継ぐ
      const videoFailed = videoResult.status !== 'fulfilled' || videoItems.length === 0;
      const existingVideos = videoFailed ? allItems.filter(i => i.type === 'video') : [];

      const base = [...newItems, ...existingVideos];
      const seen = new Set();
      const merged = base.filter(i=>{ if(seen.has(i.id)) return false; seen.add(i.id); return true; });
      merged.sort((a,b)=>new Date(b.date)-new Date(a.date));
      allItems = merged;
      saveItems();
      localStorage.setItem(TIME_KEY, Date.now());
      const now = new Date();
      const vCnt = merged.filter(i=>i.type==='video').length;
      const warn = videoFailed ? '⚠ビデオ取得失敗・前回分を保持 ' : '';
      document.getElementById('last-updated').textContent =
        warn + now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+
        ' 全件取得（ビデオ'+vCnt+'件）';
    }
    render();

  } catch(err) {
    if (allItems.length>0) {
      render();
      document.getElementById('last-updated').textContent='⚠ 取得失敗–キャッシュ表示';
    } else {
      document.getElementById('content-area').innerHTML=
        '<div class="error-box"><strong>⚠️ データを取得できませんでした</strong>'+
        '「全件取得」ボタンを押してください。'+
        '<code>'+escHtml(err.message)+'</code></div>';
    }
  } finally {
    diffBtn.disabled=false; fullBtn.disabled=false;
    document.getElementById('refresh-icon').textContent='🔄';
    setDetail('');
  }
}

// 差分取得：最後に取得した最新アイテムの日付以降のみ
function fetchDiff() {
  const latestDate = allItems.length
    ? new Date(Math.max(...allItems.map(i=>new Date(i.date))))
    : null;
  doFetch(latestDate);
}

// 全件取得
function fetchAll() { doFetch(null); }

// ── 描画（イベント委譲方式）──
function fmtDate(s){const d=new Date(s);return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render() {
  const area   = document.getElementById('content-area');
  const cutoff = sixMonthsAgo();
  // manualItemsとallItemsをマージ（重複除去）
  const seenIds = new Set();
  const combined = [...manualItems, ...allItems].filter(it => {
    if (seenIds.has(it.id)) return false;
    seenIds.add(it.id); return true;
  }).filter(it => new Date(it.date) >= cutoff);
  let items = combined;

  if     (filter==='unread')  items=items.filter(it=>!readSet.has(it.id));
  else if(filter==='read')    items=items.filter(it=> readSet.has(it.id));
  else if(filter==='manual')  items=items.filter(it=>it.manual);
  else if(['video','article','magazine','song','book','other'].includes(filter))
    items=items.filter(it=>it.type===filter);

  const recent = combined;
  document.getElementById('total-count').textContent  = recent.length;
  document.getElementById('unread-count').textContent = recent.filter(it=>!readSet.has(it.id)).length;
  document.getElementById('read-count').textContent   = recent.filter(it=> readSet.has(it.id)).length;

  if (!items.length) {
    area.innerHTML='<div class="empty-state">表示するコンテンツがありません。<br>フィルターを変更するか「新着を取得」ボタンを押してください。</div>';
    return;
  }

  const groups={};
  items.forEach(it=>{ (groups[it.date]=groups[it.date]||[]).push(it); });

  let html='';
  Object.keys(groups).sort((a,b)=>new Date(b)-new Date(a)).forEach(date=>{
    html+='<div class="date-header">'+fmtDate(date)+'更新</div>';
    groups[date].forEach(it=>{
      const isRead=readSet.has(it.id);
      const bC=it.manual?'badge-manual':(TYPE_BADGE[it.type]||'badge-other');
      const bL=it.manual?'★手動':(TYPE_LABEL[it.type]||'その他');
      const safeId=escHtml(it.id);
      html+=
        '<div class="item '+(isRead?'read':'')+'" data-id="'+safeId+'">'+
        '<div class="item-inner">'+
        '<span class="type-badge '+bC+'">'+bL+'</span>'+
        '<div class="item-body">'+
        '<a href="'+escHtml(it.url)+'" class="item-title js-title" target="_blank" data-id="'+safeId+'">'+escHtml(it.title)+'</a>'+
        (it.category?'<div class="item-category">'+escHtml(it.category)+'</div>':'')+
        (it.duration?'<div class="item-duration">⏱ '+escHtml(it.duration)+'</div>':'')+
        '</div>'+
        '<div class="item-actions">'+
        (isRead?'<span class="read-badge">閲覧済み</span>':'')+
        '<button class="toggle-btn js-toggle" data-id="'+safeId+'">'+(isRead?'未読に戻す':'閲覧済みに')+'</button>'+
        '<button class="del-btn js-del" data-id="'+safeId+'" title="削除">✕</button>'+
        '</div></div></div>';
    });
  });
  area.innerHTML = html;
  area.addEventListener('click', handleClick);
}

function handleClick(e) {
  const title = e.target.closest('.js-title');
  if (title) {
    const id = title.dataset.id;
    if (id) { readSet.add(id); saveRead(); setTimeout(render, 300); }
    return;
  }
  const toggle = e.target.closest('.js-toggle');
  if (toggle) {
    e.preventDefault();
    const id = toggle.dataset.id;
    if (id) { readSet.has(id)?readSet.delete(id):readSet.add(id); saveRead(); render(); }
  }
  const del = e.target.closest('.js-del');
  if (del) {
    e.preventDefault();
    const id = del.dataset.id;
    if (id && confirm('このアイテムを削除しますか？')) {
      // 手動アイテムかどうかで削除先を分ける
      const isManual = manualItems.some(it => it.id === id);
      if (isManual) {
        manualItems = manualItems.filter(it => it.id !== id);
        saveManual();
      } else {
        allItems = allItems.filter(it => it.id !== id);
        saveItems();
      }
      render();
    }
  }
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); filter=btn.dataset.filter; render();
  });
});
document.getElementById('refresh-btn').addEventListener('click', fetchDiff);
document.getElementById('full-refresh-btn').addEventListener('click', ()=>{
  if(confirm('全件再取得します。時間がかかります。よろしいですか？')) fetchAll();
});
document.getElementById('reset-btn').addEventListener('click',()=>{
  if(confirm('閲覧済みの記録をすべてリセットしますか？')){readSet=new Set();saveRead();render();}
});

// ── データ移行（エクスポート/インポート）──
document.getElementById('io-btn').addEventListener('click', () => {
  const p = document.getElementById('io-panel');
  const open = p.style.display === 'block';
  p.style.display = open ? 'none' : 'block';
});

document.getElementById('export-btn').addEventListener('click', () => {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    items: allItems,
    manualItems: manualItems,
    readIds: [...readSet],
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const d = new Date();
  a.download = 'jw_tracker_' + d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + '.json';
  a.click();
});

document.getElementById('import-btn').addEventListener('click', () => {
  const file = document.getElementById('import-file').files[0];
  if (!file) { alert('ファイルを選択してください'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.items || !Array.isArray(data.items)) throw new Error('形式が正しくありません');

      // アイテムをマージ（既存IDは上書きしない）
      const existingIds = new Set(allItems.map(i=>i.id));
      const newItems = data.items.filter(i => !existingIds.has(i.id));
      allItems = [...allItems, ...newItems];
      allItems.sort((a,b)=>new Date(b.date)-new Date(a.date));
      saveItems();

      // 手動アイテムもマージ
      if (data.manualItems && Array.isArray(data.manualItems)) {
        const existingManualIds = new Set(manualItems.map(i=>i.id));
        const newManual = data.manualItems.filter(i => !existingManualIds.has(i.id));
        manualItems = [...manualItems, ...newManual];
        saveManual();
      }

      // 閲覧履歴もマージ
      if (data.readIds && Array.isArray(data.readIds)) {
        data.readIds.forEach(id => readSet.add(id));
        saveRead();
      }

      localStorage.setItem(TIME_KEY, Date.now());
      render();
      document.getElementById('io-panel').style.display = 'none';
      alert('インポート完了！ +' + newItems.length + '件追加されました。');
    } catch(err) {
      alert('インポート失敗: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ── 手動追加 ──
document.getElementById('toggle-add-btn').addEventListener('click', () => {
  const p = document.getElementById('add-panel');
  const open = p.style.display === 'block';
  p.style.display = open ? 'none' : 'block';
  document.getElementById('toggle-add-btn').textContent = open ? '＋ 手動追加' : '✕ 閉じる';
  if (!open) document.getElementById('add-date').value = new Date().toISOString().split('T')[0];
});

document.getElementById('do-add-btn').addEventListener('click', () => {
  const title = document.getElementById('add-title').value.trim();
  const url   = document.getElementById('add-url').value.trim();
  const date  = document.getElementById('add-date').value;
  const type  = document.getElementById('add-type').value;
  if (!title) { alert('タイトルを入力してください'); return; }
  if (!url)   { alert('URLを入力してください'); return; }
  if (!date)  { alert('日付を選択してください'); return; }
  manualItems.unshift({
    id: 'manual_' + Date.now(),
    title, url, date,
    dateObj: new Date(date).toISOString(),
    category: '', duration: '', type, manual: true
  });
  saveManual();
  document.getElementById('add-title').value = '';
  document.getElementById('add-url').value = '';
  document.getElementById('add-panel').style.display = 'none';
  document.getElementById('toggle-add-btn').textContent = '＋ 手動追加';
  render();
});

// ── 初期化：自動取得なし。キャッシュがあればそのまま表示 ──
// 英語記事がキャッシュに混入していた場合は除去
const beforeCount = allItems.length;
allItems = allItems.filter(it => {
  if (it.type === 'video') return true;
  if (it.manual) return true;
  if (!it.title) return true;
  return /[぀-鿿]/.test(it.title);
});
if (allItems.length !== beforeCount) saveItems();

if (allItems.length > 0) {
  const t = parseInt(localStorage.getItem(TIME_KEY)||'0');
  if (t) {
    const d = new Date(t);
    const today = new Date();
    const isToday = d.toDateString() === today.toDateString();
    const time = d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    document.getElementById('last-updated').textContent =
      isToday ? '今日 '+time+' 取得' : (d.getMonth()+1)+'/'+d.getDate()+' '+time+' 取得';
  }
  render();
} else {
  // キャッシュなし：空の案内を表示（自動取得しない）
  document.getElementById('content-area').innerHTML =
    '<div class="empty-state">データがありません。<br>「🔃 全件取得」を押して最初のデータを取得してください。</div>';
}
</script>
</body>
